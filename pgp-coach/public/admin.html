<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTM PGP Coach · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0d1333;--indigo:#3730a3;--violet:#5b4cf5;--blue:#6c8ef7;--cyan:#38bdf8;--white:#f8f9ff;--muted:#8b92b8;--border:rgba(255,255,255,0.08);--card:rgba(255,255,255,0.04)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 90% 0%,rgba(91,76,245,0.12) 0%,transparent 60%),linear-gradient(160deg,#0d1333 0%,#0a0f28 100%);pointer-events:none;z-index:0}

  #admin-login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:rgba(10,15,40,0.95)}
  .login-card{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center}
  .login-card h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px}
  .login-card p{font-size:13px;color:var(--muted);margin-bottom:28px}
  .field{display:flex;flex-direction:column;gap:6px;text-align:left;margin-bottom:14px}
  .field label{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
  .field input{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;width:100%}
  .field input:focus{border-color:var(--violet)}
  .field input::placeholder{color:rgba(255,255,255,0.2)}
  .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--violet),var(--indigo));border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:4px}
  .btn-primary:hover{box-shadow:0 6px 24px rgba(91,76,245,0.4)}
  .error-msg{font-size:12px;color:#f87171;margin-top:8px;display:none}

  #admin-app{position:relative;z-index:1;display:none;min-height:100vh}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:rgba(13,19,51,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.1em;text-transform:uppercase}
  .logo span{color:var(--cyan)}
  .admin-badge{background:rgba(91,76,245,0.2);border:1px solid rgba(91,76,245,0.3);color:var(--blue);font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px;letter-spacing:0.05em}
  .header-right{display:flex;align-items:center;gap:16px}
  .btn-link{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color 0.2s;font-family:'DM Sans',sans-serif}
  .btn-link:hover{color:var(--white)}

  /* MAIN CONTENT */
  #main-view{display:block}
  main{padding:32px}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .page-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
  .page-actions{display:flex;gap:10px;align-items:center}

  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
  .stat-label{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
  .stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
  .stat-value.cyan{color:var(--cyan)}.stat-value.violet{color:#a78bfa}.stat-value.blue{color:var(--blue)}.stat-value.yellow{color:#fbbf24}

  .filter-input{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;min-width:200px}
  .filter-input:focus{border-color:var(--violet)}
  .filter-input::placeholder{color:rgba(255,255,255,0.2)}

  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead tr{border-bottom:1px solid var(--border)}
  th{padding:12px 20px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)}
  td{padding:14px 20px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,0.02)}
  .member-name{font-weight:500;color:var(--white)}
  .member-sub{color:var(--muted);font-size:12px;margin-top:2px}
  .team-badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:500;background:rgba(91,76,245,0.15);color:var(--blue)}
  .progress-bar-wrap{background:rgba(255,255,255,0.06);border-radius:100px;height:6px;width:120px;overflow:hidden}
  .progress-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:width 0.3s}
  .progress-label{font-size:11px;color:var(--muted);margin-top:4px}
  .status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500}
  .s-not_started{background:rgba(255,255,255,0.06);color:var(--muted)}
  .s-in_progress{background:rgba(251,191,36,0.12);color:#fbbf24}
  .s-complete{background:rgba(56,189,248,0.12);color:var(--cyan)}
  .action-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--white);font-size:12px;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;margin-right:4px}
  .action-btn:hover{background:rgba(255,255,255,0.12)}
  .action-btn.danger{color:#f87171;border-color:rgba(248,113,113,0.2)}
  .action-btn.danger:hover{background:rgba(248,113,113,0.1)}
  .action-btn.primary{background:rgba(91,76,245,0.2);border-color:rgba(91,76,245,0.4);color:var(--blue)}
  .action-btn.primary:hover{background:rgba(91,76,245,0.3)}
  .last-active{font-size:11px;color:var(--muted)}
  .empty-state{text-align:center;padding:48px;color:var(--muted)}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
  .modal{background:#141b45;border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
  .modal h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .form-group label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted)}
  .form-group input,.form-group textarea,.form-group select{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;width:100%}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--violet)}
  .form-group textarea{resize:vertical;min-height:80px}
  .form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,0.2)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .btn-cancel{padding:10px 20px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
  .btn-save{padding:10px 20px;background:linear-gradient(135deg,var(--violet),var(--indigo));border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.04em}
  .pin-display{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:0.2em;color:var(--cyan);text-align:center;padding:20px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:12px;margin:20px 0}
  .pin-note{font-size:13px;color:var(--muted);text-align:center}

  /* PLAN VIEWER */
  #plan-view{display:none;position:fixed;inset:0;z-index:150;background:var(--navy);flex-direction:column}
  .plan-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(13,19,51,0.95);backdrop-filter:blur(12px);flex-shrink:0}
  .plan-topbar-left{display:flex;align-items:center;gap:14px}
  .plan-topbar h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
  .plan-topbar-right{display:flex;gap:10px}
  .btn-outline{padding:8px 18px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s}
  .btn-outline:hover{background:rgba(255,255,255,0.06)}
  .btn-download{padding:8px 18px;background:linear-gradient(135deg,var(--violet),var(--indigo));border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.04em}
  #plan-scroll{flex:1;overflow-y:auto;padding:40px 28px}
  #plan-scroll::-webkit-scrollbar{width:4px}
  #plan-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  /* PLAN DOCUMENT */
  .plan-doc{max-width:820px;margin:0 auto}
  .plan-cover{text-align:center;padding:40px 0 48px;border-bottom:1px solid var(--border);margin-bottom:40px}
  .plan-cover .tr-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;color:var(--cyan);margin-bottom:20px}
  .plan-cover h1{font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.15;margin-bottom:8px}
  .plan-cover .plan-subtitle{font-size:16px;color:var(--muted);margin-bottom:28px}
  .plan-meta{display:inline-flex;gap:24px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:16px 24px;flex-wrap:wrap;justify-content:center}
  .plan-meta-item .meta-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .plan-meta-item .meta-value{font-size:13px;font-weight:500;color:var(--white)}
  .plan-section{margin-bottom:48px}
  .section-tag{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--violet);margin-bottom:6px}
  .section-heading{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:20px}
  .section-divider{height:1px;background:var(--border);margin-bottom:28px}
  .subsection{margin-bottom:28px}
  .subsection-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px}
  .why-list{list-style:none;counter-reset:why}
  .why-list li{counter-increment:why;display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:14px;line-height:1.6;color:rgba(255,255,255,0.85)}
  .why-list li::before{content:counter(why);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--violet);background:rgba(91,76,245,0.15);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .why-statement{background:rgba(91,76,245,0.08);border:1px solid rgba(91,76,245,0.2);border-left:3px solid var(--violet);border-radius:0 10px 10px 0;padding:16px 20px;font-size:14px;line-height:1.7;font-style:italic;color:rgba(255,255,255,0.9);margin-top:16px}
  .values-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .value-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px}
  .value-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
  .value-desc{font-size:13px;color:rgba(255,255,255,0.7);line-height:1.6}
  .strengths-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
  .strength-card{background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:10px;padding:14px;text-align:center}
  .strength-card .strength-label{font-size:10px;font-weight:600;color:var(--cyan);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
  .strength-card .strength-text{font-size:13px;font-weight:500}
  .dev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .dev-item{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,0.8)}
  .dev-item::before{content:'→';color:var(--muted);font-size:12px}
  .superpower-box{background:linear-gradient(135deg,rgba(91,76,245,0.12),rgba(56,189,248,0.08));border:1px solid rgba(91,76,245,0.25);border-radius:12px;padding:20px;text-align:center}
  .superpower-box .sp-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px}
  .superpower-box .sp-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
  .vision-text{font-size:15px;line-height:1.8;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:20px 24px;font-style:italic}
  .goals-table,.rhythm-table,.contributions-table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden}
  .goals-table th,.rhythm-table th,.contributions-table th{background:rgba(91,76,245,0.2);padding:10px 16px;text-align:left;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--blue)}
  .goals-table td,.rhythm-table td,.contributions-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.85)}
  .goals-table tr:last-child td,.rhythm-table tr:last-child td,.contributions-table tr:last-child td{border-bottom:none}
  .goals-table tr:nth-child(even) td,.rhythm-table tr:nth-child(even) td,.contributions-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
  .cat-cell,.day-cell{font-weight:600;color:var(--white);width:120px}
  .q-cell{font-weight:700;color:var(--violet);width:60px}
  .rocks-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .rock-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px}
  .rock-quarter{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--violet);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em}
  .rock-goals{list-style:none;display:flex;flex-direction:column;gap:6px}
  .rock-goals li{font-size:13px;color:rgba(255,255,255,0.8);padding-left:14px;position:relative;line-height:1.5}
  .rock-goals li::before{content:'•';position:absolute;left:0;color:var(--violet)}
  .scorecard-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .score-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:13px;color:rgba(255,255,255,0.85)}
  .score-item::before{content:'📊';font-size:14px}
  .accountability-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .acc-item .acc-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .acc-item .acc-value{font-size:13px;color:var(--white);line-height:1.5}
  .impact-statement{font-size:15px;line-height:1.8;color:rgba(255,255,255,0.9);background:rgba(91,76,245,0.08);border:1px solid rgba(91,76,245,0.2);border-left:3px solid var(--violet);border-radius:0 12px 12px 0;padding:20px 24px}
  .partnership-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:20px;font-size:13px;line-height:1.7;color:rgba(255,255,255,0.8)}
  .reflection-approach{font-size:14px;line-height:1.8;color:rgba(255,255,255,0.85);margin-bottom:20px}
  .reflection-questions{list-style:none;display:flex;flex-direction:column;gap:10px}
  .reflection-questions li{display:flex;gap:12px;font-size:13px;color:rgba(255,255,255,0.8);padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;line-height:1.5}
  .reflection-questions li::before{content:'?';font-family:'Syne',sans-serif;font-weight:800;color:var(--cyan);font-size:14px;flex-shrink:0}
  .growth-intention{font-size:15px;line-height:1.8;font-style:italic;color:rgba(255,255,255,0.9);background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:12px;padding:20px 24px}
  .checklist{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
  .checklist li{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,0.8)}
  .check-box{width:18px;height:18px;border:2px solid var(--violet);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .check-box::after{content:'✓';font-size:10px;color:var(--cyan);font-weight:700}
  .commitment-statement{background:linear-gradient(135deg,rgba(91,76,245,0.12),rgba(56,189,248,0.08));border:1px solid rgba(91,76,245,0.3);border-radius:16px;padding:28px 32px;text-align:center;margin-top:24px}
  .commitment-statement .cs-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px}
  .commitment-statement .cs-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;line-height:1.7;color:var(--white);margin-bottom:20px}
  .commitment-sig{display:flex;justify-content:center;gap:48px;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1)}
  .sig-item{text-align:center}
  .sig-line{width:140px;height:1px;background:rgba(255,255,255,0.2);margin:0 auto 6px}
  .sig-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  .plan-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;gap:16px;color:var(--muted)}
  .plan-loading .spinner{width:40px;height:40px;border:3px solid rgba(91,76,245,0.2);border-top-color:var(--violet);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}main{padding:16px}}
</style>
</head>
<body>

<div id="admin-login">
  <div class="login-card">
    <h2>Admin Portal</h2>
    <p>GTM Collective PGP Coach</p>
    <div class="field"><label>Email</label><input type="email" id="admin-email" placeholder="admin@teamrevenue.com" /></div>
    <div class="field"><label>Password</label><input type="password" id="admin-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()" /></div>
    <button class="btn-primary" onclick="adminLogin()">Sign In</button>
    <div class="error-msg" id="admin-error">Invalid credentials. Please try again.</div>
  </div>
</div>

<div id="admin-app">
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo">TEAM<span>REVENUE</span></div>
      <span class="admin-badge">Admin Portal</span>
    </div>
    <div class="header-right">
      <span style="font-size:12px;color:var(--muted)" id="admin-name"></span>
      <button class="btn-link" onclick="adminLogout()">Sign out</button>
    </div>
  </header>

  <div id="main-view">
    <main>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Total Members</div><div class="stat-value cyan" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value yellow" id="stat-progress">—</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value violet" id="stat-complete">—</div></div>
        <div class="stat-card"><div class="stat-label">Not Started</div><div class="stat-value blue" id="stat-notstarted">—</div></div>
      </div>

      <div class="page-header">
        <div class="page-title">Members</div>
        <div class="page-actions">
          <input class="filter-input" type="text" id="search-input" placeholder="Search by name, role, or team…" oninput="filterMembers()" />
          <button class="btn-primary" style="padding:8px 20px;font-size:12px;width:auto" onclick="showAddMember()">+ Add Member</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Member</th>
              <th>Team</th>
              <th>Progress</th>
              <th>Status</th>
              <th>Last Active</th>
              <th>PIN</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="members-tbody"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none"><p>No members yet. Add your first member above.</p></div>
      </div>
    </main>
  </div>
</div>

<!-- PLAN VIEWER -->
<div id="plan-view">
  <div class="plan-topbar">
    <div class="plan-topbar-left">
      <button class="btn-outline" onclick="closePlanView()">← Back to Members</button>
      <h3 id="plan-view-title">Member PGP</h3>
    </div>
    <div class="plan-topbar-right">
      <button class="btn-download" onclick="window.print()">⬇ Download PDF</button>
    </div>
  </div>
  <div id="plan-scroll">
    <div class="plan-loading"><div class="spinner"></div><p>Loading plan…</p></div>
  </div>
</div>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
let allMembers = [];

// ── AUTH ──
async function adminLogin() {
  const email = document.getElementById('admin-email').value;
  const password = document.getElementById('admin-password').value;
  const err = document.getElementById('admin-error');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/admin/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { err.style.display='block'; return; }
    document.getElementById('admin-login').style.display = 'none';
    document.getElementById('admin-app').style.display = 'block';
    document.getElementById('admin-name').textContent = data.name;
    loadMembers();
  } catch(e) { err.style.display='block'; }
}

async function adminLogout() {
  await fetch('/api/auth/admin/logout', { method:'POST' });
  location.reload();
}

// ── DATA ──
async function loadMembers() {
  try {
    const res = await fetch('/api/admin/hires');
    const data = await res.json();
    allMembers = Array.isArray(data) ? data : [];
  } catch(e) { allMembers = []; }
  updateStats();
  renderMembers(allMembers);
}

function updateStats() {
  document.getElementById('stat-total').textContent = allMembers.length;
  document.getElementById('stat-progress').textContent = allMembers.filter(m=>m.status==='in_progress').length;
  document.getElementById('stat-complete').textContent = allMembers.filter(m=>m.status==='complete').length;
  document.getElementById('stat-notstarted').textContent = allMembers.filter(m=>m.status==='not_started').length;
}

function renderMembers(members) {
  const tbody = document.getElementById('members-tbody');
  const empty = document.getElementById('empty-state');
  if (!members.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = members.map(m => {
    const complete = parseInt(m.modules_complete) || 0;
    const pct = Math.round((complete/6)*100);
    const lastActive = m.last_active_at ? new Date(m.last_active_at).toLocaleDateString() : 'Never';
    const teamBadge = m.team ? `<span class="team-badge">${escHtml(m.team)}</span>` : `<span style="color:var(--muted);font-size:11px">—</span>`;
    return `<tr>
      <td><div class="member-name">${escHtml(m.first_name)} ${escHtml(m.last_name)}</div><div class="member-sub">${escHtml(m.role)}${m.manager_name?' · '+escHtml(m.manager_name):''}</div></td>
      <td>${teamBadge}</td>
      <td>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        <div class="progress-label">${complete} of 6 modules</div>
      </td>
      <td><span class="status-pill s-${m.status}">${m.status.replace('_',' ')}</span></td>
      <td><span class="last-active">${lastActive}</span></td>
      <td><span style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:0.1em">${m.pin}</span></td>
      <td>
        ${m.status==='complete'?`<button class="action-btn primary" onclick="viewPlan('${m.id}','${escHtml(m.first_name)} ${escHtml(m.last_name)}')">View PGP</button>`:''}
        <button class="action-btn" onclick="editMember('${m.id}')">Edit</button>
        <button class="action-btn danger" onclick="deleteMember('${m.id}','${escHtml(m.first_name)}')">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function filterMembers() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allMembers.filter(m =>
    !q || `${m.first_name} ${m.last_name} ${m.role} ${m.team||''}`.toLowerCase().includes(q)
  );
  renderMembers(filtered);
}

// ── ADD/EDIT MEMBER ──
function showAddMember() {
  showModal(`
    <h3>Add New Member</h3>
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input id="h-fname" placeholder="Alex" /></div>
      <div class="form-group"><label>Last Name</label><input id="h-lname" placeholder="Chen" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Role</label><input id="h-role" placeholder="Growth Architect" /></div>
      <div class="form-group"><label>Team</label><input id="h-team" placeholder="RevOps" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Manager</label><input id="h-manager" placeholder="Sarah Kim" /></div>
      <div class="form-group"><label>Start Date</label><input type="date" id="h-date" /></div>
    </div>
    <div class="form-group"><label>Context Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(for the AI coach)</span></label><textarea id="h-notes" placeholder="e.g. Joining from enterprise sales, strong in data, first RevOps role…"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNewMember()">Create Member & Generate PIN</button>
    </div>
  `);
  setTimeout(()=>document.getElementById('h-fname').focus(),100);
}

async function saveNewMember() {
  const first_name = document.getElementById('h-fname').value.trim();
  const last_name = document.getElementById('h-lname').value.trim();
  const role = document.getElementById('h-role').value.trim();
  if (!first_name || !role) { alert('First name and role are required.'); return; }
  const res = await fetch('/api/admin/hires', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      first_name, last_name, role,
      team: document.getElementById('h-team').value.trim() || null,
      manager_name: document.getElementById('h-manager').value.trim(),
      start_date: document.getElementById('h-date').value || null,
      context_notes: document.getElementById('h-notes').value.trim()
    })
  });
  const data = await res.json();
  showModal(`
    <h3>✓ Member Added!</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:4px">${first_name} ${last_name} has been added. Share this PIN with them to access their PGP coaching session:</p>
    <div class="pin-display">${data.pin}</div>
    <p class="pin-note" style="margin-bottom:20px">They'll enter this at the login screen to get started.</p>
    <div class="modal-actions"><button class="btn-save" onclick="closeModal();loadMembers()">Done</button></div>
  `);
}

async function editMember(id) {
  const member = allMembers.find(m=>m.id===id);
  if (!member) return;
  showModal(`
    <h3>Edit Member</h3>
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input id="eh-fname" value="${escHtml(member.first_name)}" /></div>
      <div class="form-group"><label>Last Name</label><input id="eh-lname" value="${escHtml(member.last_name)}" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Role</label><input id="eh-role" value="${escHtml(member.role)}" /></div>
      <div class="form-group"><label>Team</label><input id="eh-team" value="${escHtml(member.team||'')}" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Manager</label><input id="eh-manager" value="${escHtml(member.manager_name||'')}" /></div>
      <div class="form-group"><label>Start Date</label><input type="date" id="eh-date" value="${member.start_date?member.start_date.split('T')[0]:''}" /></div>
    </div>
    <div class="form-group"><label>Context Notes</label><textarea id="eh-notes">${escHtml(member.context_notes||'')}</textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="updateMember('${id}')">Save Changes</button>
    </div>
  `);
}

async function updateMember(id) {
  await fetch(`/api/admin/hires/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      first_name: document.getElementById('eh-fname').value.trim(),
      last_name: document.getElementById('eh-lname').value.trim(),
      role: document.getElementById('eh-role').value.trim(),
      team: document.getElementById('eh-team').value.trim() || null,
      manager_name: document.getElementById('eh-manager').value.trim(),
      start_date: document.getElementById('eh-date').value || null,
      context_notes: document.getElementById('eh-notes').value.trim()
    })
  });
  closeModal(); loadMembers();
}

async function deleteMember(id, name) {
  if (!confirm(`Delete ${name}? This will permanently remove all their conversations and plan.`)) return;
  await fetch(`/api/admin/hires/${id}`, { method:'DELETE' });
  loadMembers();
}

// ── PLAN VIEWER ──
async function viewPlan(id, name) {
  document.getElementById('plan-view-title').textContent = `${name}'s PGP`;
  document.getElementById('plan-view').style.display = 'flex';
  document.getElementById('plan-scroll').innerHTML = `<div class="plan-loading"><div class="spinner"></div><p>Loading plan…</p></div>`;

  try {
    const res = await fetch(`/api/admin/hires/${id}`);
    const data = await res.json();
    if (data.plan && data.plan.content) {
      renderPlan(data.plan.content);
    } else {
      document.getElementById('plan-scroll').innerHTML = `<div class="plan-loading"><p>Plan not yet generated for this member.</p></div>`;
    }
  } catch (e) {
    document.getElementById('plan-scroll').innerHTML = `<div class="plan-loading"><p>Error loading plan.</p></div>`;
  }
}

function closePlanView() {
  document.getElementById('plan-view').style.display = 'none';
}

function renderPlan(content) {
  let plan;
  try {
    plan = JSON.parse(content);
  } catch (e) {
    document.getElementById('plan-scroll').innerHTML = `<div class="plan-doc"><pre style="white-space:pre-wrap;font-size:13px;line-height:1.7;color:rgba(255,255,255,0.85);padding:20px">${escHtml(content)}</pre></div>`;
    return;
  }

  const m = plan.member || {};
  const id = plan.identity || {};
  const vi = plan.vision || {};
  const sy = plan.system || {};
  const im = plan.impact || {};
  const re = plan.reflection || {};
  const co = plan.commitment || {};

  document.getElementById('plan-scroll').innerHTML = `
  <div class="plan-doc">
    <div class="plan-cover">
      <div class="tr-logo">TEAMREVENUE</div>
      <h1>Personal Growth Plan</h1>
      <div class="plan-subtitle">GTM Collective · PGP</div>
      <div class="plan-meta">
        <div class="plan-meta-item"><div class="meta-label">Member</div><div class="meta-value">${escHtml(m.name||'')}</div></div>
        <div class="plan-meta-item"><div class="meta-label">Role</div><div class="meta-value">${escHtml(m.role||'')}</div></div>
        <div class="plan-meta-item"><div class="meta-label">Manager</div><div class="meta-value">${escHtml(m.manager||'')}</div></div>
        <div class="plan-meta-item"><div class="meta-label">Generated</div><div class="meta-value">${escHtml(m.generated_at||'')}</div></div>
      </div>
    </div>

    <div class="plan-section">
      <div class="section-tag">Section 1</div>
      <div class="section-heading">"Who Am I and Why Am I Here?"</div>
      <div class="section-divider"></div>
      <div class="subsection">
        <div class="subsection-title">1.1 — The Why Ladder</div>
        <ol class="why-list">${(id.five_whys||[]).map(w=>`<li>${escHtml(w)}</li>`).join('')}</ol>
        <div class="why-statement">${escHtml(id.core_why_statement||'')}</div>
      </div>
      <div class="subsection">
        <div class="subsection-title">1.2 — Core Values</div>
        <div class="values-grid">${(id.values||[]).map(v=>`<div class="value-card"><div class="value-name">${escHtml(v.name)}</div><div class="value-desc">${escHtml(v.description)}</div></div>`).join('')}</div>
      </div>
      <div class="subsection">
        <div class="subsection-title">1.3 — Strengths & Edge</div>
        <div class="strengths-row">${(id.strengths||[]).map(s=>`<div class="strength-card"><div class="strength-label">Strength</div><div class="strength-text">${escHtml(s)}</div></div>`).join('')}</div>
        <div class="dev-list">${(id.development_areas||[]).map(d=>`<div class="dev-item">${escHtml(d)}</div>`).join('')}</div>
        <div class="superpower-box"><div class="sp-label">⚡ Superpower</div><div class="sp-text">${escHtml(id.superpower||'')}</div></div>
      </div>
    </div>

    <div class="plan-section">
      <div class="section-tag">Section 2</div>
      <div class="section-heading">"Where Am I Going?"</div>
      <div class="section-divider"></div>
      <div class="subsection">
        <div class="subsection-title">2.1 — 3-Year Vision</div>
        <div class="vision-text">${escHtml(vi.three_year_vision||'')}</div>
      </div>
      <div class="subsection">
        <div class="subsection-title">2.2 — 12-Month Goals</div>
        <table class="goals-table"><thead><tr><th>Category</th><th>My Goal</th></tr></thead><tbody>${(vi.twelve_month_goals||[]).map(g=>`<tr><td class="cat-cell">${escHtml(g.category)}</td><td>${escHtml(g.goal)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div class="subsection">
        <div class="subsection-title">2.3 — Quarterly Rocks</div>
        <div class="rocks-grid">${(vi.quarterly_rocks||[]).map(q=>`<div class="rock-card"><div class="rock-quarter">${escHtml(q.quarter)}</div><ul class="rock-goals">${(q.goals||[]).map(g=>`<li>${escHtml(g)}</li>`).join('')}</ul></div>`).join('')}</div>
      </div>
    </div>

    <div class="plan-section">
      <div class="section-tag">Section 3</div>
      <div class="section-heading">"How Will I Execute?"</div>
      <div class="section-divider"></div>
      <div class="subsection">
        <div class="subsection-title">3.1 — Weekly Operating Rhythm</div>
        <table class="rhythm-table"><thead><tr><th>Day</th><th>Focus</th><th>Notes</th></tr></thead><tbody>${(sy.weekly_rhythm||[]).map(r=>`<tr><td class="day-cell">${escHtml(r.day)}</td><td>${escHtml(r.focus)}</td><td>${escHtml(r.notes)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div class="subsection">
        <div class="subsection-title">3.2 — Personal Scorecard</div>
        <div class="scorecard-list">${(sy.scorecard_metrics||[]).map(s=>`<div class="score-item">${escHtml(s)}</div>`).join('')}</div>
      </div>
      <div class="subsection">
        <div class="subsection-title">3.3 — Accountability Partner</div>
        <div class="accountability-box">
          <div class="acc-item"><div class="acc-label">Partner</div><div class="acc-value">${escHtml(sy.accountability_partner||'')}</div></div>
          <div class="acc-item"><div class="acc-label">Rhythm</div><div class="acc-value">${escHtml(sy.accountability_rhythm||'')}</div></div>
          <div class="acc-item"><div class="acc-label">Focus</div><div class="acc-value">${escHtml(sy.accountability_focus||'')}</div></div>
        </div>
      </div>
    </div>

    <div class="plan-section">
      <div class="section-tag">Section 4</div>
      <div class="section-heading">"How Will I Contribute?"</div>
      <div class="section-divider"></div>
      <div class="subsection">
        <div class="subsection-title">4.1 — Collective Impact Statement</div>
        <div class="impact-statement">${escHtml(im.collective_impact_statement||'')}</div>
      </div>
      <div class="subsection">
        <div class="subsection-title">4.2 — Quarterly Contribution Goals</div>
        <table class="contributions-table"><thead><tr><th>Quarter</th><th>How I Will Contribute</th></tr></thead><tbody>${(im.quarterly_contributions||[]).map(c=>`<tr><td class="q-cell">${escHtml(c.quarter)}</td><td>${escHtml(c.contribution)}</td></tr>`).join('')}</tbody></table>
      </div>
      <div class="subsection">
        <div class="subsection-title">4.3 — Path to Partnership</div>
        <div class="partnership-box">${escHtml(im.partnership_reflection||'')}</div>
      </div>
    </div>

    <div class="plan-section">
      <div class="section-tag">Section 5</div>
      <div class="section-heading">"What Am I Learning?"</div>
      <div class="section-divider"></div>
      <div class="subsection">
        <div class="subsection-title">5.1 — Quarterly Reflection Practice</div>
        <div class="reflection-approach">${escHtml(re.quarterly_reflection_approach||'')}</div>
        <ul class="reflection-questions">${(re.reflection_questions||[]).map(q=>`<li>${escHtml(q)}</li>`).join('')}</ul>
      </div>
      <div class="subsection">
        <div class="subsection-title">5.2 — Annual Growth Intention</div>
        <div class="growth-intention">${escHtml(re.annual_growth_intention||'')}</div>
      </div>
    </div>

    <div class="plan-section">
      <div class="section-tag">Section 6</div>
      <div class="section-heading">Integration & Commitment</div>
      <div class="section-divider"></div>
      <div class="subsection">
        <div class="subsection-title">Checklist</div>
        <ul class="checklist">${(co.integration_checklist||['Complete & sign your PGP','Schedule accountability sessions','Share contribution goals with your pod','Set quarterly reflection reminders']).map(item=>`<li><div class="check-box"></div>${escHtml(item)}</li>`).join('')}</ul>
      </div>
      <div class="commitment-statement">
        <div class="cs-label">My Commitment</div>
        <div class="cs-text">${escHtml(co.statement||'')}</div>
        <div class="commitment-sig">
          <div class="sig-item"><div class="sig-line"></div><div class="sig-label">Name</div></div>
          <div class="sig-item"><div class="sig-line"></div><div class="sig-label">Date</div></div>
          <div class="sig-item"><div class="sig-line"></div><div class="sig-label">Signature</div></div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── MODAL ──
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Session check
(async () => {
  const res = await fetch('/api/auth/session');
  const data = await res.json();
  if (data.type === 'admin') {
    document.getElementById('admin-login').style.display = 'none';
    document.getElementById('admin-app').style.display = 'block';
    document.getElementById('admin-name').textContent = data.name;
    loadMembers();
  }
})();
</script>
</body>
</html>
